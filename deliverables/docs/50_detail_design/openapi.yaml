openapi: 3.0.3
info:
  title: Expense SaaS API
  description: |
    ## この文書の役割
    - 目的: 全 API エンドポイントの正本仕様を定義する
    - 正本情報: API パス、リクエスト/レスポンス定義、エラーレスポンス、認可条件（x-authz）、要件対応（x-requirements）
    - 扱わない内容: 認可ロジックの実装詳細（authz.md）、DB スキーマ定義（db_schema.md）、画面仕様（screens/*.md）
    - 主な参照元: 30_arch/architecture.md, 10_requirements/policies.md, 50_detail_design/authz.md
    - 主な参照先: 50_detail_design/screens/*.md, 60_test/test_cases/*.md

    経費精算SaaS MVP の API 仕様。
    全 API レスポンス（`/api/*`）は `{"data": ...}` ラッパーで返却する。
    `/health` はインフラ用エンドポイントであり、data ラッパーを使用しない。
    エラーレスポンスは `{"error": {"code": "...", "message": "...", "details": [...]}}` 形式。
    エラーコード一覧の正本は security.md §8.4 を参照。
    ページネーションはカーソルベース。一覧系は `{"data": [...], "pagination": {"next_cursor": "...", "has_more": true}}` 形式。
    全ての日時フィールドは ISO 8601 UTC 形式（末尾 `Z`）で返却・受理する（例: `2026-03-22T10:30:00Z`）。タイムゾーンオフセット付き表記は使用しない。フロントエンドはユーザーのローカルタイムゾーンに変換して表示すること。
  version: 1.0.0
  contact:
    name: Expense SaaS Team

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://expense-saas.example.com
    description: Production

security:
  - bearerAuth: []

tags:
  - name: health
    description: ヘルスチェック
  - name: auth
    description: 認証
  - name: dashboard
    description: ダッシュボード
  - name: categories
    description: 経費カテゴリ
  - name: reports
    description: 経費レポート
  - name: items
    description: 経費明細
  - name: attachments
    description: 添付ファイル
  - name: workflow
    description: ワークフロー（承認・却下・支払完了）
  - name: tenant
    description: テナント管理

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      tags: [health]
      summary: ヘルスチェック
      description: DB 接続を含むサーバーの稼働状態を確認する。認証不要。
      operationId: getHealth
      security: []
      x-requirements:
        - NFR-AVAIL-001  # ヘルスチェックエンドポイント（可用性要件）
      x-authz:
        roles: []  # 認証不要
        ownership_required: false
        tenant_boundary: false
      responses:
        "200":
          description: 正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
        "503":
          description: サービス異常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /api/auth/signup:
    post:
      tags: [auth]
      summary: サインアップ
      description: テナントと Admin ユーザーを同時に新規作成する。
      operationId: signup
      security: []
      x-requirements:
        - AUTH-F01  # サインアップ
        - SEC-001   # メール + パスワード認証
        - SEC-002   # Argon2id ハッシュ
        - SEC-010   # パスワード最小長 8文字
      x-authz:
        roles: []  # 未認証（認証不要）
        ownership_required: false
        tenant_boundary: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company_name, user_name, email, password]
              properties:
                company_name:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: 会社名
                user_name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: ユーザー名
                email:
                  type: string
                  format: email
                  maxLength: 254
                  description: メールアドレス
                password:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
                  description: パスワード（8文字以上）
      responses:
        "201":
          description: サインアップ成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AuthTokens"
        "409":
          description: メールアドレス重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: "このメールアドレスは既に登録されています"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/auth/login:
    post:
      tags: [auth]
      summary: ログイン
      description: |
        メールアドレスとパスワードで認証し、JWT を発行する。
        SEC-011 に基づき、メール形式・パスワード長のバリデーション制約はスキーマに含めない（認証関連の全失敗を 401 に統一するため）。クライアント側で入力バリデーションを実施すること。
      operationId: login
      security: []
      x-requirements:
        - AUTH-F02  # ログイン
        - SEC-001   # メール + パスワード認証
        - SEC-003   # JWT 有効期間（アクセス15分、リフレッシュ7日）
        - SEC-004   # RS256 署名
        - SEC-011   # ユーザー存在推測防止
      x-authz:
        roles: []  # 未認証（認証不要）
        ownership_required: false
        tenant_boundary: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  maxLength: 254
                  description: メールアドレス
                password:
                  type: string
                  format: password
                  maxLength: 128
                  description: パスワード
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AuthTokens"
        "400":
          description: リクエストボディ不正（JSON パースエラー・必須項目欠落）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: BAD_REQUEST
                  message: "Invalid request body"
        "401":
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: INVALID_CREDENTIALS
                  message: "メールアドレスまたはパスワードが正しくありません"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: トークンリフレッシュ
      description: |
        リフレッシュトークンを使用して新しいアクセストークンとリフレッシュトークンを発行する。
        リフレッシュトークンローテーション: 旧リフレッシュトークンは無効化される。
        レスポンスには最新の user/tenant 情報を含む（ロール変更等の即時反映のため）。
      operationId: refreshToken
      security: []
      x-requirements:
        - AUTH-F03  # トークンリフレッシュ
        - SEC-003   # JWT 有効期間
      x-authz:
        roles: []  # 未認証（リフレッシュトークン認証）
        ownership_required: false
        tenant_boundary: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: リフレッシュトークン
      responses:
        "200":
          description: リフレッシュ成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AuthTokens"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      tags: [auth]
      summary: ログアウト
      description: |
        リフレッシュトークンを無効化する。
        アクセストークンが期限切れでもログアウト可能。リクエストボディの refresh_token で認証する。
      operationId: logout
      security: []
      x-requirements:
        - AUTH-F04  # ログアウト
        - SEC-005   # リフレッシュトークン無効化
      x-authz:
        roles: []  # 未認証（リフレッシュトークン認証）
        ownership_required: false
        tenant_boundary: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: 無効化するリフレッシュトークン
      responses:
        "200":
          description: ログアウト成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: "ログアウトしました"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/me:
    get:
      tags: [auth]
      summary: 認証情報取得
      description: |
        現在のログインユーザーの情報を取得する。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting
        - 所有者条件: なし（自分自身の情報のみ返却）
        - 状態条件: なし
        - テナント境界越え: 該当なし（JWT の情報を返却するのみ）
      operationId: getMe
      x-requirements:
        - AUTH-F05  # 認証情報取得
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: false
        tenant_boundary: false  # JWT の情報を返却するのみ
      responses:
        "200":
          description: ユーザー情報
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/password-reset:
    post:
      tags: [auth]
      summary: パスワードリセット要求
      description: |
        パスワードリセット用のメールを送信する。
        ユーザーの存在に関わらず同一の成功レスポンスを返却する（SEC-011）。
      operationId: requestPasswordReset
      security: []
      x-requirements:
        - AUTH-F06  # パスワードリセット
        - SEC-006   # リセットトークン（1時間有効、1回使用で無効化）
        - SEC-011   # ユーザー存在推測防止
      x-authz:
        roles: []  # 未認証（認証不要）
        ownership_required: false
        tenant_boundary: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 254
                  description: 登録済みメールアドレス
      responses:
        "200":
          description: リクエスト受付（メールアドレスの登録有無に関わらず同一レスポンス）
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: "パスワードリセットメールを送信しました"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/auth/password-reset/{token}:
    put:
      tags: [auth]
      summary: パスワードリセット実行
      description: リセットトークンを使用して新しいパスワードを設定する。トークンは1回使用で無効化される（SEC-006）。
      operationId: executePasswordReset
      security: []
      x-requirements:
        - AUTH-F06  # パスワードリセット
        - SEC-006   # リセットトークン（1回使用で無効化）
        - SEC-010   # パスワード最小長 8文字
      x-authz:
        roles: []  # 未認証（リセットトークン認証）
        ownership_required: false
        tenant_boundary: false
      parameters:
        - name: token
          in: path
          required: true
          description: パスワードリセットトークン
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
                  description: 新しいパスワード（8文字以上）
      responses:
        "200":
          description: パスワード変更成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: "パスワードを変更しました"
        "422":
          description: トークン無効またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Dashboard
  # ---------------------------------------------------------------------------
  /api/dashboard:
    get:
      tags: [dashboard]
      summary: ダッシュボード
      description: |
        ロール別にフィールドが異なるダッシュボードデータを返却する。
        - Member: 自分のレポートカウント + 直近レポート
        - Approver: Member の情報 + 承認待ち件数 + 月別支出サマリー
        - Accounting: Member の情報 + 支払待ち件数 + 月別支出サマリー
        - Admin: テナント全体のステータス別件数 + メンバー数 + 月別支出サマリー

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting
        - 所有者条件: なし（ロールに応じて返却フィールドが異なる）
        - 状態条件: なし
        - テナント境界越え: 該当なし（JWT の tenant_id スコープで自動フィルタ）
      operationId: getDashboard
      x-requirements:
        - DASH-F01  # ダッシュボード取得
        - DASH-001  # Member: 自分の件数表示
        - DASH-002  # Approver: 承認待ち件数追加
        - DASH-003  # Accounting: 支払待ち件数追加
        - DASH-004  # Admin: テナント全体件数
        - DASH-005  # 月別支出サマリー
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: false
        tenant_boundary: true  # tenant_id スコープで自動フィルタ
      responses:
        "200":
          description: ダッシュボードデータ
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Categories
  # ---------------------------------------------------------------------------
  /api/categories:
    get:
      tags: [categories]
      summary: カテゴリ一覧
      description: |
        利用可能な経費カテゴリの一覧を取得する（グローバル + テナント固有）。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting
        - 所有者条件: なし
        - 状態条件: なし
        - テナント境界越え: 該当なし（カテゴリはグローバルマスタ）
      operationId: listCategories
      x-requirements:
        - ITM-005  # カテゴリは固定6種類
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: false
        tenant_boundary: false  # カテゴリはグローバルマスタ
      responses:
        "200":
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Reports
  # ---------------------------------------------------------------------------
  /api/reports:
    get:
      tags: [reports]
      summary: 自分のレポート一覧
      description: |
        現在のユーザーが作成した経費レポートの一覧を取得する。カーソルベースページネーション対応。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting
        - 所有者条件: 自分が作成したレポートのみ返却（user_id フィルタ）
        - 状態条件: なし（全状態のレポートを返却）
        - テナント境界越え: 該当なし（JWT の tenant_id + user_id スコープで自動フィルタ）
      operationId: listMyReports
      x-requirements:
        - RPT-F02   # レポート一覧取得（自分）
        - RBC-010   # 所有者のレポートに限定
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: true  # 自分が作成したレポートのみ（user_id フィルタ）
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: status
          in: query
          description: ステータスフィルタ
          schema:
            $ref: "#/components/schemas/ReportStatus"
        - name: from
          in: query
          description: 対象期間の開始日（YYYY-MM-DD）
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: 対象期間の終了日（YYYY-MM-DD）
          schema:
            type: string
            format: date
      responses:
        "200":
          description: レポート一覧
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpenseReportSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [reports]
      summary: レポート作成
      description: |
        新規経費レポートを draft 状態で作成する。
        再申請の場合は `reference_report_id` を指定すると、元レポートの明細がコピーされる（添付はコピーされない）。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting
        - 所有者条件: なし（作成者が自動的に所有者になる）
        - 状態条件: なし（新規作成は常に draft）
        - テナント境界越え: 該当なし（JWT の tenant_id がレポートに設定される）
      operationId: createReport
      x-requirements:
        - RPT-F01   # レポート作成
        - RPT-001   # タイトル必須
        - RPT-002   # 対象期間必須
        - RPT-003   # 開始日 <= 終了日
        - RPT-010   # 全ロール作成可能
        - RPT-015   # 再申請は新規レポート
        - RPT-016   # reference_report_id 保持
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: false  # 作成者が自動的に所有者
        tenant_boundary: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseReportCreateRequest"
      responses:
        "201":
          description: レポート作成成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ExpenseReportDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/reports/all:
    get:
      tags: [reports]
      summary: 全レポート一覧
      description: |
        テナント内の全経費レポートを取得する（Admin, Accounting 用）。

        認可条件:
        - 許可ロール: Admin, Accounting
        - 所有者条件: なし（テナント内の全レポートを閲覧可能）
        - 状態条件: なし（全状態のレポートを返却）
        - テナント境界越え: 該当なし（JWT の tenant_id スコープで自動フィルタ）
        - 権限不足（Member, Approver）: 403 FORBIDDEN
      operationId: listAllReports
      x-requirements:
        - RPT-F07   # テナント全レポート一覧取得
        - RBC-013   # Admin: 全レポート閲覧可能
      x-authz:
        roles: [admin, accounting]
        ownership_required: false  # テナント内の全レポートを閲覧可能
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: status
          in: query
          description: ステータスフィルタ
          schema:
            $ref: "#/components/schemas/ReportStatus"
        - name: from
          in: query
          description: 対象期間の開始日（YYYY-MM-DD）
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: 対象期間の終了日（YYYY-MM-DD）
          schema:
            type: string
            format: date
        - name: submitter_id
          in: query
          description: 申請者 ID でフィルタ
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 全レポート一覧
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/ExpenseReportSummary"
                        - type: object
                          required: [submitter]
                          properties:
                            submitter:
                              description: 申請者情報
                              $ref: "#/components/schemas/UserSummary"
                  pagination:
