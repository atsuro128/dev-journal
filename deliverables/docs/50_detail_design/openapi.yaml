        - ATT-F04   # ファイル削除
        - ATT-020   # draft 状態のみ削除可能
        - RBC-010   # 所有者のレポートに限定
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: true  # 所有者のみ（RBC-010）
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/reportId"
        - $ref: "#/components/parameters/itemId"
        - $ref: "#/components/parameters/attachmentId"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: ロール不足または所有権不足（FORBIDDEN）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: draft 以外のレポートの添付は削除不可
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Workflow
  # ---------------------------------------------------------------------------
  /api/workflow/pending:
    get:
      tags: [workflow]
      summary: 承認待ち一覧
      description: |
        Approver 用。同一テナント内の submitted 状態レポート一覧を取得する。
        自分のレポートも含まれる（is_own_report フラグで識別）。

        認可条件:
        - 許可ロール: Approver（RBC-011）
        - 所有者条件: なし（同一テナントの submitted レポート全件を返却。自分のレポートも含む）
        - 状態条件: submitted のみ（API 側で固定フィルタ）
        - テナント境界越え: 該当なし（JWT の tenant_id スコープで自動フィルタ）
        - 権限不足（Member, Admin, Accounting）: 403 FORBIDDEN
      operationId: listPendingReports
      x-requirements:
        - WFL-F04   # 承認待ち一覧
        - RBC-011   # Approver: 同テナント submitted レポート承認/却下可能
        - RBC-015   # MVP: 全件承認型
      x-authz:
        roles: [approver]
        ownership_required: false  # テナント内 submitted 全件返却
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: applicant_name
          in: query
          description: 申請者名部分一致フィルタ
          schema:
            type: string
      responses:
        "200":
          description: 承認待ちレポート一覧
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PendingReport"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/workflow/{id}/approve:
    post:
      tags: [workflow]
      summary: 承認
      description: |
        submitted 状態のレポートを承認する（T2: submitted -> approved）。
        自己承認は禁止（RBC-016）。楽観的ロックのため `updated_at` が必須。

        認可条件:
        - 許可ロール: Approver（RBC-011）
        - 所有者条件: 非所有者のみ（自己承認禁止: RBC-016。自分が作成したレポートは承認不可）
        - 状態条件: submitted のみ（submitted 以外は 422 INVALID_STATE_TRANSITION）
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 権限不足（Member, Admin, Accounting）: 403 FORBIDDEN
        - 自己承認: 403 SELF_APPROVAL_NOT_ALLOWED
      operationId: approveReport
      x-requirements:
        - WFL-F01   # 承認
        - WFL-011   # submitted -> approved 遷移
        - RBC-011   # Approver: submitted レポート承認可能
        - RBC-016   # 自己承認禁止
      x-authz:
        roles: [approver]
        ownership_required: false  # 非所有者のみ（自己承認禁止: RBC-016）
        tenant_boundary: true
      parameters:
        - name: id
          in: path
          required: true
          description: レポート ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [updated_at]
              properties:
                comment:
                  type: string
                  maxLength: 1000
                  description: 承認コメント（任意）
                updated_at:
                  type: string
                  format: date-time
                  description: 楽観的ロック用の最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
      responses:
        "200":
          description: 承認成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ExpenseReportDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 権限不足または自己承認
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: 不正な状態遷移
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/workflow/{id}/reject:
    post:
      tags: [workflow]
      summary: 却下
      description: |
        submitted 状態のレポートを却下する（T3: submitted -> rejected）。
        却下理由は必須（WFL-012）。自己却下は禁止（RBC-016）。楽観的ロックのため `updated_at` が必須。

        認可条件:
        - 許可ロール: Approver（RBC-011）
        - 所有者条件: 非所有者のみ（自己却下禁止: RBC-016。自分が作成したレポートは却下不可）
        - 状態条件: submitted のみ（submitted 以外は 422 INVALID_STATE_TRANSITION）
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 権限不足（Member, Admin, Accounting）: 403 FORBIDDEN
        - 自己却下: 403 SELF_APPROVAL_NOT_ALLOWED
      operationId: rejectReport
      x-requirements:
        - WFL-F02   # 却下
        - WFL-012   # submitted -> rejected 遷移（却下理由必須）
        - RBC-011   # Approver: submitted レポート却下可能
        - RBC-016   # 自己却下禁止
      x-authz:
        roles: [approver]
        ownership_required: false  # 非所有者のみ（自己却下禁止: RBC-016）
        tenant_boundary: true
      parameters:
        - name: id
          in: path
          required: true
          description: レポート ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectRequest"
      responses:
        "200":
          description: 却下成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ExpenseReportDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 権限不足または自己却下
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: 不正な状態遷移または却下理由なし
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/workflow/payable:
    get:
      tags: [workflow]
      summary: 支払待ち一覧
      description: |
        Accounting 用。同一テナント内の approved 状態レポート一覧を取得する。
        自分のレポートも含まれる（is_own_report フラグで識別）。

        認可条件:
        - 許可ロール: Accounting
        - 所有者条件: なし（同一テナントの approved レポート全件を返却。自分のレポートも含む）
        - 状態条件: approved のみ（API 側で固定フィルタ）
        - テナント境界越え: 該当なし（JWT の tenant_id スコープで自動フィルタ）
        - 権限不足（Member, Approver, Admin）: 403 FORBIDDEN
      operationId: listPayableReports
      x-requirements:
        - WFL-F05   # 支払待ち一覧
      x-authz:
        roles: [accounting]
        ownership_required: false  # テナント内 approved 全件返却
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: applicant_name
          in: query
          description: 申請者名部分一致フィルタ
          schema:
            type: string
      responses:
        "200":
          description: 支払待ちレポート一覧
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PayableReport"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/workflow/{id}/pay:
    post:
      tags: [workflow]
      summary: 支払処理済み
      description: |
        approved 状態のレポートの支払完了を記録する（T4: approved -> paid）。
        自己支払処理は禁止（RBC-012）。楽観的ロックのため `updated_at` が必須。

        認可条件:
        - 許可ロール: Accounting（RBC-012）
        - 所有者条件: 非所有者のみ（自己支払処理禁止: RBC-012。自分が作成したレポートの支払完了は記録不可）
        - 状態条件: approved のみ（approved 以外は 422 INVALID_STATE_TRANSITION）
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 権限不足（Member, Approver, Admin）: 403 FORBIDDEN
        - 自己支払処理: 403 SELF_PAYMENT_NOT_ALLOWED
      operationId: markReportAsPaid
      x-requirements:
        - WFL-F03   # 支払完了
        - WFL-013   # approved -> paid 遷移
        - RBC-012   # 自己支払処理禁止
      x-authz:
        roles: [accounting]
        ownership_required: false  # 非所有者のみ（自己支払処理禁止: RBC-012）
        tenant_boundary: true
      parameters:
        - name: id
          in: path
          required: true
          description: レポート ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [updated_at]
              properties:
                updated_at:
                  type: string
                  format: date-time
                  description: 楽観的ロック用の最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
      responses:
        "200":
          description: 支払完了記録成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ExpenseReportDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 権限不足または自己支払処理
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: 不正な状態遷移
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Tenant
  # ---------------------------------------------------------------------------
  /api/tenant:
    get:
      tags: [tenant]
      summary: テナント情報取得
      description: |
        JWT の tenant_id からテナントの基本情報を取得する。Admin のみアクセス可能。

        認可条件:
        - 許可ロール: Admin
        - 所有者条件: なし（JWT の tenant_id で自テナント情報を返却）
        - 状態条件: なし
        - テナント境界越え: 該当なし（JWT の tenant_id で自動特定）
        - 権限不足（Member, Approver, Accounting）: 403 FORBIDDEN
      operationId: getTenant
      x-requirements:
        - ADM-F01  # テナント情報取得
      x-authz:
        roles: [admin]
        ownership_required: false
        tenant_boundary: true  # JWT の tenant_id で自動特定
      responses:
        "200":
          description: テナント情報
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TenantInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/tenant/members:
    get:
      tags: [tenant]
      summary: テナント内メンバー一覧
      description: |
        テナント内の全メンバー一覧を取得する。管理画面のフィルタドロップダウン等で使用する。
        アクセス可能ロール: Admin, Accounting（SCR-ADM-001 準拠）。

        認可条件:
        - 許可ロール: Admin, Accounting
        - 所有者条件: なし（テナント内の全メンバー名一覧を返却）
        - 状態条件: なし
        - テナント境界越え: 該当なし（JWT の tenant_id スコープで自動フィルタ）
        - 権限不足（Member, Approver）: 403 FORBIDDEN
      operationId: listTenantMembers
      x-requirements:
        - RPT-F07  # テナント全レポート一覧取得の付随機能（申請者フィルタ用）
      x-authz:
        roles: [admin, accounting]
        ownership_required: false
        tenant_boundary: true  # tenant_id スコープで自動フィルタ
      responses:
        "200":
          description: メンバー一覧
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

# =============================================================================
# Components
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 で署名された JWT アクセストークン（有効期限 15分）

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # --- Error ---
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: 機械可読なエラーコード
              example: RESOURCE_NOT_FOUND
            message:
              type: string
              description: 人間可読なエラーメッセージ
              example: "Resource not found"
            details:
              type: array
              description: 400/422 のバリデーションエラー時のみ付与。フィールド単位のエラー情報を配列で返却する
              items:
                $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: エラーが発生したフィールド名
          example: title
        message:
          type: string
          description: フィールドレベルのエラーメッセージ
          example: "Title is required"

    # --- Auth ---
    AuthTokens:
      type: object
      required: [user, tenant, access_token, refresh_token]
      properties:
        user:
          type: object
          required: [id, name, email, role]
          properties:
            id:
              type: string
              format: uuid
              description: ユーザー ID
            name:
              type: string
              description: ユーザー名
            email:
              type: string
              format: email
              description: メールアドレス
            role:
              type: string
              enum: [admin, approver, member, accounting]
              description: テナント内ロール
        tenant:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
              description: テナント ID
            name:
              type: string
              description: 会社名
        access_token:
          type: string
          description: JWT アクセストークン（15分有効）
        refresh_token:
          type: string
          description: JWT リフレッシュトークン（7日有効）

    UserProfile:
      type: object
      required: [id, name, email, role, tenant]
      properties:
        id:
          type: string
          format: uuid
          description: ユーザー ID
        name:
          type: string
          description: ユーザー名
        email:
          type: string
          format: email
          description: メールアドレス
        role:
          type: string
          enum: [admin, approver, member, accounting]
          description: テナント内ロール
        tenant:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
              description: テナント ID
            name:
              type: string
              description: 会社名

    TenantInfo:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: テナント ID
        name:
          type: string
          description: 会社名
        created_at:
          type: string
          format: date-time
          description: テナント作成日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    # --- Expense Report ---
    ExpenseReportSummary:
      type: object
      required: [id, title, period_start, period_end, status, total_amount, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: レポート ID
        title:
          type: string
          description: タイトル
        period_start:
          type: string
          format: date
          description: 対象期間開始日（YYYY-MM-DD）
        period_end:
          type: string
          format: date
          description: 対象期間終了日（YYYY-MM-DD）
        status:
          $ref: "#/components/schemas/ReportStatus"
        total_amount:
          type: integer
          description: 合計金額（円単位）
        submitted_at:
          type: string
          format: date-time
          description: 提出日時（submitted 以降の場合、ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        created_at:
          type: string
          format: date-time
          description: 作成日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        updated_at:
          type: string
          format: date-time
          description: 最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    ExpenseReportDetail:
      type: object
      required: [id, title, period_start, period_end, status, total_amount, submitter, items, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: レポート ID
        title:
          type: string
          description: タイトル
        period_start:
          type: string
          format: date
          description: 対象期間開始日
        period_end:
          type: string
          format: date
          description: 対象期間終了日
        status:
          $ref: "#/components/schemas/ReportStatus"
        total_amount:
          type: integer
          description: 合計金額（円単位）
        submitter:
          description: 申請者情報
          $ref: "#/components/schemas/UserSummary"
        reference_report_id:
          type: string
          format: uuid
          description: 再申請元レポート ID
        submitted_at:
          type: string
          format: date-time
          description: 提出日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        submitted_by:
          $ref: "#/components/schemas/UserSummary"
        approved_at:
          type: string
          format: date-time
          description: 承認日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        approved_by:
          $ref: "#/components/schemas/UserSummary"
        approval_comment:
          type: string
          description: 承認コメント
        rejected_at:
          type: string
          format: date-time
          description: 却下日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        rejected_by:
          $ref: "#/components/schemas/UserSummary"
        rejection_reason:
          type: string
          description: 却下理由
        paid_at:
          type: string
          format: date-time
          description: 支払完了日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        paid_by:
          $ref: "#/components/schemas/UserSummary"
        items:
          type: array
          description: 経費明細一覧
          items:
            allOf:
              - $ref: "#/components/schemas/ExpenseItem"
              - type: object
                required: [attachments]
                properties:
                  attachments:
                    type: array
                    description: 添付ファイル一覧
                    items:
                      $ref: "#/components/schemas/Attachment"
        created_at:
          type: string
          format: date-time
          description: 作成日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        updated_at:
          type: string
          format: date-time
          description: 最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    ExpenseReportCreateRequest:
      type: object
      required: [title, period_start, period_end]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: タイトル
        period_start:
          type: string
          format: date
          description: 対象期間開始日（YYYY-MM-DD）
        period_end:
          type: string
          format: date
          description: 対象期間終了日（YYYY-MM-DD。開始日以降）
        reference_report_id:
          type: string
          format: uuid
          description: 再申請元レポート ID（再申請時のみ指定。明細がコピーされる）

    ExpenseReportUpdateRequest:
      type: object
      required: [title, period_start, period_end, updated_at]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: タイトル
        period_start:
          type: string
          format: date
          description: 対象期間開始日（YYYY-MM-DD）
        period_end:
          type: string
          format: date
          description: 対象期間終了日（YYYY-MM-DD。開始日以降）
        updated_at:
          type: string
          format: date-time
          description: 楽観的ロック用の最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    # --- Expense Item ---
    ExpenseItem:
      type: object
      required: [id, report_id, expense_date, amount, category, description, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: 明細 ID
        report_id:
          type: string
          format: uuid
          description: 所属レポート ID
        expense_date:
          type: string
          format: date
          description: 支出日（YYYY-MM-DD）
        amount:
          type: integer
          minimum: 1
          description: 金額（円単位、正の整数）
        category:
          $ref: "#/components/schemas/Category"
        description:
          type: string
          description: 摘要
        created_at:
          type: string
          format: date-time
          description: 作成日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        updated_at:
          type: string
          format: date-time
          description: 最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    ExpenseItemCreateRequest:
      type: object
      required: [expense_date, amount, category_id, description]
      properties:
        expense_date:
          type: string
          format: date
          description: 支出日（YYYY-MM-DD）
        amount:
          type: integer
          minimum: 1
          description: 金額（円単位、正の整数）
        category_id:
          type: string
          format: uuid
          description: カテゴリ ID
        description:
          type: string
          minLength: 1
          maxLength: 500
          description: 摘要

    ExpenseItemUpdateRequest:
      type: object
      required: [expense_date, amount, category_id, description, updated_at]
      properties:
        expense_date:
          type: string
          format: date
          description: 支出日（YYYY-MM-DD）
        amount:
          type: integer
          minimum: 1
          description: 金額（円単位、正の整数）
        category_id:
          type: string
          format: uuid
          description: カテゴリ ID
        description:
          type: string
          minLength: 1
          maxLength: 500
          description: 摘要
        updated_at:
          type: string
          format: date-time
          description: 楽観的ロック用の最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    # --- Attachment ---
    Attachment:
      type: object
      required: [id, item_id, file_name, file_size, mime_type, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: 添付ファイル ID
        item_id:
          type: string
          format: uuid
          description: 所属明細 ID
        file_name:
          type: string
          description: 元ファイル名
        file_size:
          type: integer
          description: ファイルサイズ（バイト）
        mime_type:
          type: string
          enum: [image/jpeg, image/png, application/pdf]
          description: MIME タイプ
        created_at:
          type: string
          format: date-time
          description: アップロード日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    AttachmentDownload:
      type: object
      required: [download_url, file_name, mime_type, file_size, expires_at]
      properties:
        download_url:
          type: string
          format: uri
          description: 署名付きダウンロード URL
        file_name:
          type: string
          description: 元ファイル名
        mime_type:
          type: string
          enum: [image/jpeg, image/png, application/pdf]
          description: MIME タイプ
        file_size:
          type: integer
          description: ファイルサイズ（バイト）
        expires_at:
          type: string
          format: date-time
          description: 署名付き URL の有効期限（発行から15分後、ISO 8601 UTC、例: 2026-03-22T10:45:00Z）

    # --- Workflow ---
    PendingReport:
      type: object
      required: [id, title, total_amount, submitted_at, submitter, is_own_report]
      properties:
        id:
          type: string
          format: uuid
          description: レポート ID
        title:
          type: string
          description: タイトル
        total_amount:
          type: integer
          description: 合計金額（円単位）
        submitted_at:
          type: string
          format: date-time
          description: 提出日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        submitter:
          $ref: "#/components/schemas/UserSummary"
        is_own_report:
          type: boolean
          description: 自分が作成したレポートか（自己承認禁止の表示制御に使用）

    PayableReport:
      type: object
      required: [id, title, total_amount, approved_at, submitter, is_own_report]
      properties:
        id:
          type: string
          format: uuid
          description: レポート ID
        title:
          type: string
          description: タイトル
        total_amount:
          type: integer
          description: 合計金額（円単位）
        approved_at:
          type: string
          format: date-time
          description: 承認日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
        submitter:
          $ref: "#/components/schemas/UserSummary"
        is_own_report:
          type: boolean
          description: 自分が作成したレポートか（自己支払処理禁止の表示制御に使用）

    RejectRequest:
      type: object
      required: [reason, updated_at]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1000
          description: 却下理由（必須）
        updated_at:
          type: string
          format: date-time
          description: 楽観的ロック用の最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    # --- Dashboard ---
    DashboardResponse:
      type: object
      description: |
        ロール別にフィールドの有無が異なる。
        - Member: my_draft_count, my_submitted_count, my_rejected_count, recent_reports
        - Approver: Member の全フィールド + pending_approval_count, monthly_summary
        - Accounting: Member の全フィールド + pending_payment_count, monthly_summary
        - Admin: tenant_* カウント, tenant_member_count, monthly_summary
      properties:
        my_draft_count:
          type: integer
          description: 自分の下書きレポート件数（Member, Approver, Accounting）
        my_submitted_count:
          type: integer
          description: 自分の提出中レポート件数（Member, Approver, Accounting）
        my_rejected_count:
          type: integer
          description: 自分の却下レポート件数（Member, Approver, Accounting）
        recent_reports:
          type: array
          description: 自分の直近レポート（最大5件、Member, Approver, Accounting）
          items:
            $ref: "#/components/schemas/RecentReport"
        pending_approval_count:
          type: integer
          description: 承認待ちレポート件数（Approver のみ）。同テナントの submitted レポートのうち、自分が作成したレポートを除いた件数
        pending_payment_count:
          type: integer
          description: 支払待ちレポート件数（Accounting のみ）
        monthly_summary:
          type: array
          description: 月別支出サマリー（直近3ヶ月、Approver, Accounting, Admin）
          items:
            $ref: "#/components/schemas/MonthlySummary"
        tenant_draft_count:
          type: integer
          description: テナント全体の下書き件数（Admin のみ）
        tenant_submitted_count:
          type: integer
          description: テナント全体の提出済み件数（Admin のみ）
        tenant_approved_count:
          type: integer
          description: テナント全体の承認済み件数（Admin のみ）
        tenant_rejected_count:
          type: integer
          description: テナント全体の却下件数（Admin のみ）
        tenant_paid_count:
          type: integer
          description: テナント全体の支払済み件数（Admin のみ）
        tenant_member_count:
          type: integer
          description: テナントのメンバー数（Admin のみ）

    MonthlySummary:
      type: object
      required: [year_month, total_amount]
      properties:
        year_month:
          type: string
          description: 年月（YYYY-MM 形式）
          example: "2026-03"
        total_amount:
          type: integer
          description: 月別合計金額（円単位）

    RecentReport:
      type: object
      required: [id, title, period_start, period_end, total_amount, status, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: レポート ID
        title:
          type: string
          description: タイトル
        period_start:
          type: string
          format: date
          description: 対象期間開始日
        period_end:
          type: string
          format: date
          description: 対象期間終了日
        total_amount:
          type: integer
          description: 合計金額（円単位）
        status:
          $ref: "#/components/schemas/ReportStatus"
        updated_at:
          type: string
          format: date-time
          description: 最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）

    # --- Common ---
    Pagination:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: string
          description: 次ページのカーソル値（has_more が true の場合に存在）
        has_more:
          type: boolean
          description: 次ページの存在有無

    UserSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
          description: ユーザー ID
        name:
          type: string
          description: ユーザー名

    Category:
      type: object
      required: [id, code, name_ja, sort_order]
      properties:
        id:
          type: string
          format: uuid
          description: カテゴリ ID
        code:
          type: string
          description: カテゴリコード
          example: transportation
        name_ja:
          type: string
          description: 日本語名
          example: 交通費
        sort_order:
          type: integer
          description: 表示順

    HealthCheckResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: 全体ステータス
        checks:
          type: object
          required: [database]
          properties:
            database:
              type: string
              enum: [ok, error]
              description: DB 接続状態

    ReportStatus:
      type: string
      enum: [draft, submitted, approved, rejected, paid]
      description: |
        経費レポートの状態。
        - draft: 下書き
        - submitted: 提出済み
        - approved: 承認済み
        - rejected: 却下
        - paid: 支払済み

  # ---------------------------------------------------------------------------
  # Parameters
  # ---------------------------------------------------------------------------
  parameters:
    reportId:
      name: id
      in: path
      required: true
      description: レポート ID
      schema:
        type: string
        format: uuid

    itemId:
      name: itemId
      in: path
      required: true
      description: 明細 ID
      schema:
        type: string
        format: uuid

    attachmentId:
      name: attId
      in: path
      required: true
      description: 添付ファイル ID
      schema:
        type: string
        format: uuid

    cursor:
      name: cursor
      in: query
      description: ページネーションカーソル（前回レスポンスの next_cursor）
      schema:
        type: string

    limit:
      name: limit
      in: query
      description: 取得件数（デフォルト 20、最大 100）
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  # ---------------------------------------------------------------------------
  # Responses
  # ---------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: UNAUTHORIZED
              message: "Authentication required"

    Forbidden:
      description: ロール不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: FORBIDDEN
              message: "Insufficient permissions"

    NotFound:
      description: リソース未発見（テナント境界越えを含む）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: RESOURCE_NOT_FOUND
              message: "Resource not found"

    Conflict:
      description: 楽観的ロック競合
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: CONFLICT
              message: "Resource has been modified by another user"

    ValidationFailed:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: VALIDATION_ERROR
              message: "Input validation failed"
              details:
                - field: title
                  message: "Title is required"

    TooManyRequests:
      description: レート制限超過
      headers:
        Retry-After:
          description: 再試行可能になるまでの秒数
          schema:
            type: integer
        X-RateLimit-Limit:
          description: ウィンドウあたりの制限値
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: ウィンドウ内の残りリクエスト数
          schema:
            type: integer
        X-RateLimit-Reset:
          description: ウィンドウリセットの Unix タイムスタンプ
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: "Too many requests. Please try again later."

    InternalServerError:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: INTERNAL_ERROR
              message: "Internal server error"
