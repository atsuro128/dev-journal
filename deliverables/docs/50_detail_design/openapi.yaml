        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/reports/{id}:
    get:
      tags: [reports]
      summary: レポート詳細
      description: |
        経費レポートの詳細を取得する。
        レスポンスには明細（items）配列がネストされ、各明細には添付（attachments）配列がネストされる。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting
        - 所有者条件: ロールと状態による閲覧範囲制限あり
          - Member: 自分が作成したレポートのみ
          - Approver: 自分のレポート + 同一テナントの submitted 状態レポート + 自分が承認/却下したレポート
          - Accounting: 自分のレポート + 同一テナントの全レポート
          - Admin: 同一テナントの全レポート
        - 状態条件: なし（閲覧可能範囲内であれば全状態を閲覧可能）
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 同一テナント内の権限不足: 403 FORBIDDEN
      operationId: getReport
      x-requirements:
        - RPT-F03   # レポート詳細取得
        - RBC-013   # Admin: 全レポート閲覧
        - RBC-014   # Admin: 自分のレポートのみ申請者操作
        - RBC-015   # Approver: submitted 全件閲覧
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: false  # ロール別閲覧範囲制限あり（Authorizer で判定）
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/reportId"
      responses:
        "200":
          description: レポート詳細
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ExpenseReportDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: ロール不足または所有権不足（FORBIDDEN）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [reports]
      summary: レポート更新
      description: |
        下書き状態のレポートのタイトル・対象期間を更新する。楽観的ロックのため `updated_at` が必須。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting（RBC-010）
        - 所有者条件: 所有者のみ（自分が作成したレポートに限定）
        - 状態条件: draft のみ
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 同一テナント内の権限不足（所有者でない）: 403 FORBIDDEN
      operationId: updateReport
      x-requirements:
        - RPT-F04   # レポート編集
        - RPT-011   # draft 状態でのみ編集可能
        - RPT-012   # 所有者のみ編集可能
        - RBC-010   # 所有者のレポートに限定
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: true  # 所有者のみ（RBC-010）
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/reportId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseReportUpdateRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ExpenseReportDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: ロール不足または所有権不足（FORBIDDEN）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

    delete:
      tags: [reports]
      summary: レポート削除
      description: |
        下書き状態のレポートを論理削除する。関連する明細・添付も連動して論理削除される。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting（RBC-010）
        - 所有者条件: 所有者のみ（自分が作成したレポートに限定）
        - 状態条件: draft のみ（draft 以外は 422 REPORT_NOT_DELETABLE）
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 同一テナント内の権限不足（所有者でない）: 403 FORBIDDEN
      operationId: deleteReport
      x-requirements:
        - RPT-F05   # レポート削除
        - RPT-013   # draft 状態でのみ削除可能
        - RBC-010   # 所有者のレポートに限定
        - DAT-002   # 論理削除
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: true  # 所有者のみ（RBC-010）
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/reportId"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: ロール不足または所有権不足（FORBIDDEN）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: draft 以外のレポートは削除不可
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: REPORT_NOT_DELETABLE
                  message: "Report can only be deleted in draft status"

  /api/reports/{id}/submit:
    post:
      tags: [reports]
      summary: レポート提出
      description: |
        下書きレポートを承認者に提出する。
        事前条件: status == draft、明細1件以上、テナント内に Approver が1人以上存在。
        楽観的ロックのため `updated_at` が必須。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting（RBC-010）
        - 所有者条件: 所有者のみ（自分が作成したレポートに限定）
        - 状態条件: draft のみ（draft 以外は 422 INVALID_STATE_TRANSITION）
        - 追加条件: 明細1件以上（422 EMPTY_REPORT）、テナント内に Approver が1人以上存在（422 NO_APPROVER）
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 同一テナント内の権限不足（所有者でない）: 403 FORBIDDEN
      operationId: submitReport
      x-requirements:
        - RPT-F06   # レポート提出
        - RPT-014   # 明細1件以上必要
        - WFL-010   # draft -> submitted 遷移
        - WFL-014   # Approver 1人以上存在
        - RBC-010   # 所有者のレポートに限定
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: true  # 所有者のみ（RBC-010）
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/reportId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [updated_at]
              properties:
                updated_at:
                  type: string
                  format: date-time
                  description: 楽観的ロック用の最終更新日時（ISO 8601 UTC、例: 2026-03-22T10:30:00Z）
      responses:
        "200":
          description: 提出成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ExpenseReportDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: ロール不足または所有権不足（FORBIDDEN）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: 状態遷移エラー・明細なし・Approver 不在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

