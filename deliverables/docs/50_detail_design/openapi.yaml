          - Accounting: 自分のレポート + 同一テナントの全レポートの添付
          - Admin: 同一テナントの全レポートの添付
        - 状態条件: なし（閲覧可能範囲内であれば全状態）
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 同一テナント内の権限不足: 403 FORBIDDEN
      operationId: listAttachments
      x-requirements:
