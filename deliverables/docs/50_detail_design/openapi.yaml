  # ---------------------------------------------------------------------------
  # Attachments
  # ---------------------------------------------------------------------------
  /api/reports/{id}/items/{itemId}/attachments:
    post:
      tags: [attachments]
      summary: 添付ファイルアップロード
      description: |
        下書きレポートの明細に添付ファイル（領収書）をアップロードする。
        API 経由プロキシ方式: サーバーがバリデーション後に S3 にアップロードする。
        許可 MIME タイプ: image/jpeg, image/png, application/pdf。サイズ上限: 5MB。

        認可条件:
        - 許可ロール: Member, Approver, Admin, Accounting（RBC-010）
        - 所有者条件: 所有者のみ（自分が作成したレポートに限定）
        - 状態条件: draft のみ（draft 以外は 422 REPORT_NOT_EDITABLE）
        - テナント境界越え: 404 RESOURCE_NOT_FOUND
        - 同一テナント内の権限不足（所有者でない）: 403 FORBIDDEN
        - レート制限: 10 req/min/user（429 RATE_LIMIT_EXCEEDED）
      operationId: uploadAttachment
      x-requirements:
        - ATT-F01   # ファイルアップロード
        - ATT-002   # 許可形式: JPEG, PNG, PDF
        - ATT-003   # サイズ上限 5MB
        - ATT-013   # MIME タイプ検証
        - ATT-014   # S3 パスにテナントID含む
        - ATT-020   # draft 状態のみアップロード可能
        - RBC-010   # 所有者のレポートに限定
      x-authz:
        roles: [admin, approver, member, accounting]
        ownership_required: true  # 所有者のみ（RBC-010）
        tenant_boundary: true
      parameters:
        - $ref: "#/components/parameters/reportId"
        - $ref: "#/components/parameters/itemId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: アップロードするファイル（JPEG, PNG, PDF。5MB以下）
      responses:
        "201":
          description: アップロード成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Attachment"
        "400":
          description: ファイルパートが存在しない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: BAD_REQUEST
                  message: "Invalid request body"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: ロール不足または所有権不足（FORBIDDEN）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: ファイルサイズ超過
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: FILE_TOO_LARGE
                  message: "File size exceeds the 5MB limit"
        "422":
          description: ファイル形式不正または draft 以外のレポート
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    get:
      tags: [attachments]
      summary: 添付ファイル一覧
      description: |
        明細に紐づく添付ファイルの一覧を取得する。署名付き URL は含まない。

